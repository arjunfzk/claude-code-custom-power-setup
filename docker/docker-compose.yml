services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 2g
    restart: unless-stopped
    healthcheck:
      test: curl -sf http://localhost:8000/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A src.workers.app worker --loglevel=info --max-tasks-per-child=100 --concurrency=2
    env_file: ../.env
    depends_on:
      - redis
      - postgres
    mem_limit: 4g
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER:-app}
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 1g
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    ports:
      - "${REDIS_PORT:-6379}:6379"

volumes:
  pgdata:
  redisdata:
